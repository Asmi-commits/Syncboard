worker_processes auto;

events { worker_connections 1024; use epoll; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on; tcp_nopush on; keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream backend { server backend:8000; keepalive 32; }
    upstream frontend { server frontend:80; }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        location / { proxy_pass http://frontend; proxy_set_header Host $host; }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/ {
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        location /health { proxy_pass http://backend/health; }
    }
}
